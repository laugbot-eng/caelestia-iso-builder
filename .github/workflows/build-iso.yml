name: Build Caelestia Linux ISO

on:
  workflow_dispatch:    # Lanzable manualmente desde GitHub
  push:
    branches: [main]   # También al hacer push a main

jobs:
  build-iso:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Instalar dependencias
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            dosfstools \
            erofs-utils \
            libarchive-tools \
            mtools \
            squashfs-tools \
            syslinux \
            xorriso \
          || true

      - name: Limpiar espacio en disco
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/hostedtoolcache
          df -h

      - name: Construir imagen Docker
        run: docker build -t caelestia-builder .

      - name: Ejecutar build de ISO en Docker
        run: |
          mkdir -p output
          docker run --rm --privileged \
            -v "$PWD/output:/build/output" \
            caelestia-builder \
            bash /build/scripts/build-in-docker.sh

      - name: Subir ISO como artifact
        uses: actions/upload-artifact@v4
        with:
          name: caelestia-linux-iso
          path: output/*.iso
          retention-days: 7
          compression-level: 0

      - name: Mostrar tamaño de ISO
        run: ls -lh output/ 2>/dev/null || echo "No se generó ISO"
